<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Zero Fail</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#050914;
    color:#d1d5db;
}

.container{max-width:900px;margin:auto;padding:20px;}

.card{
    background:#111827;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

input,button{
    padding:8px;
    margin:4px;
    border-radius:6px;
    border:none;
}

button{background:#2563eb;color:white;cursor:pointer;}

table{width:100%;border-collapse:collapse;}

td,th{
    padding:6px;
    border-bottom:1px solid #1f2937;
    text-align:center;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.terminal{
    background:black;
    color:#22c55e;
    height:180px;
    overflow:auto;
    padding:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 PORTFOLIO (STABLE MODE)</h2>

<div class="card">
<input id="s" placeholder="TICKER (ENI.MI)">
<input id="q" type="number" placeholder="QTA">
<input id="b" type="number" placeholder="BUY">
<button onclick="add()">ADD</button>
<button onclick="refresh()">REFRESH</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>ASSET</th>
<th>PRICE</th>
<th>P/L</th>
<th>SRC</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>
</div>

<div class="card">
<div class="terminal" id="term"></div>
</div>

</div>

<script>

let pf = JSON.parse(localStorage.getItem("pf") || "[]");
let cache = {};

function log(m){
    const t = document.getElementById("term");
    const time = new Date().toLocaleTimeString();
    t.innerHTML += `[${time}] ${m}<br>`;
    t.scrollTop = t.scrollHeight;
}

// =========================
// NORMALIZZAZIONE
// =========================
function normalize(s){
    return s.toLowerCase().trim().replace(".mi",".it");
}

// =========================
// STOOQ FETCH (WORKING)
// =========================
async function fetchPrice(symbol){

    try{

        const url = `https://stooq.com/q/l/?s=${symbol}&f=sd2t2ohlcv&h&e=json`;

        const r = await fetch(url);
        const j = await r.json();

        const p = parseFloat(j?.symbols?.[0]?.close);

        if(p && !isNaN(p)) return p;

        return null;

    }catch(e){
        return null;
    }
}

// =========================
// SMART PRICE
// =========================
async function price(symbol){

    const s = normalize(symbol);

    log(`TRY ${s}`);

    let p = await fetchPrice(s);

    if(p){

        cache[symbol] = {p, t:Date.now()};
        log(`OK ${symbol} = ${p}`);

        return {p, src:"stooq", status:"green"};
    }

    // cache fallback
    if(cache[symbol]?.p){

        log(`CACHE ${symbol} = ${cache[symbol].p}`);

        return {p:cache[symbol].p, src:"cache", status:"yellow"};
    }

    log(`FAIL ${symbol}`);

    return {p:0, src:"none", status:"red"};
}

// =========================
// PORTFOLIO
// =========================
async function add(){

    const s = document.getElementById("s").value;
    const q = +document.getElementById("q").value;
    const b = +document.getElementById("b").value;

    if(!s || !q || !b){
        alert("compila tutto");
        return;
    }

    const res = await price(s);

    pf.push({
        s,q,b,
        p:res.p,
        src:res.src
    });

    save();
    render();
}

async function refresh(){

    log("=== REFRESH ===");

    for(let x of pf){

        const res = await price(x.s);

        x.p = res.p;
        x.src = res.src;

        log(`${x.s} -> ${x.p}`);
    }

    save();
    render();
}

// =========================
// RENDER
// =========================
function render(){

    const tbl = document.getElementById("tbl");
    tbl.innerHTML = "";

    let total=0;
    let cost=0;

    pf.forEach(x=>{

        const v = x.q * x.p;
        const c = x.q * x.b;
        const pl = v - c;

        total += v;
        cost += c;

        tbl.innerHTML += `
        <tr>
            <td>${x.s}</td>
            <td>${x.p.toFixed(2)}</td>
            <td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
            <td>${x.src}</td>
        </tr>`;
    });

    log(`PORTFOLIO ${(total-cost).toFixed(2)}`);
}

function save(){
    localStorage.setItem("pf", JSON.stringify(pf));
}

render();
log("READY (STOOQ ENGINE)");

</script>

</body>
</html>
