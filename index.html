<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Portfolio PRO DATA FEED</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#070b14;
    color:#d1d5db;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:#111827;
    padding:12px;
    border-radius:10px;
    margin:10px 0;
}

input,button{
    padding:8px;
    margin:4px;
    border-radius:6px;
    border:none;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    padding:6px;
    border-bottom:1px solid #1f2937;
    text-align:center;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#eab308;}

.terminal{
    background:black;
    color:#22c55e;
    height:180px;
    overflow:auto;
    padding:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 PRO DATA FEED PORTFOLIO</h2>

<div class="card">
<input id="s" placeholder="TICKER (ENI.MI)">
<input id="q" type="number" placeholder="QTA">
<input id="b" type="number" placeholder="BUY">
<button onclick="add()">ADD</button>
<button onclick="manualUpdate()">REFRESH</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>ASSET</th>
<th>PRICE</th>
<th>P/L</th>
<th>STATUS</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>
</div>

<div class="card">
<div class="terminal" id="term"></div>
</div>

</div>

<script>

let pf = JSON.parse(localStorage.getItem("pf")) || [];
let cache = {};

function log(msg){
    const t = document.getElementById("term");
    const time = new Date().toLocaleTimeString();
    t.innerHTML += `[${time}] ${msg}<br>`;
    t.scrollTop = t.scrollHeight;
}

async function price(symbol){

    const s = symbol.toLowerCase().trim();

    // cache 60s
    if(cache[symbol] && Date.now() - cache[symbol].t < 60000){
        return cache[symbol];
    }

    // =====================
    // 1. STOOQ (PRIMARY)
    // =====================
    try{
        const stooq = s.includes(".mi")
            ? s.replace(".mi",".it")
            : s;

        const url = `https://stooq.com/q/l/?s=${stooq}&f=sd2t2ohlcv&h&e=json`;
        const r = await fetch(url);
        const j = await r.json();

        const p = parseFloat(j?.symbols?.[0]?.close);

        if(p && !isNaN(p)){
            log(`STOOQ OK ${symbol} = ${p}`);

            cache[symbol] = {p,src:"stooq",t:Date.now(),status:"green"};
            return cache[symbol];
        }

    }catch(e){
        log(`STOOQ FAIL ${symbol}`);
    }

    // =====================
    // 2. YAHOO (FALLBACK)
    // =====================
    try{
        const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`;
        const r = await fetch(url);
        const j = await r.json();

        const p = j?.quoteResponse?.result?.[0]?.regularMarketPrice;

        if(p && !isNaN(p)){
            log(`YAHOO OK ${symbol} = ${p}`);

            cache[symbol] = {p,src:"yahoo",t:Date.now(),status:"yellow"};
            return cache[symbol];
        }

    }catch(e){
        log(`YAHOO FAIL ${symbol}`);
    }

    // =====================
    // 3. FALLBACK CACHE
    // =====================
    log(`NO DATA ${symbol}`);

    return cache[symbol] || {p:0,src:"none",status:"red"};
}

async function add(){

    const s = document.getElementById("s").value.toUpperCase().trim();
    const q = +document.getElementById("q").value;
    const b = +document.getElementById("b").value;

    if(!s || !q || !b){
        alert("Compila tutti i campi");
        return;
    }

    const res = await price(s);

    pf.push({
        s,
        q,
        b,
        p:res.p,
        src:res.src,
        status:res.status
    });

    save();
    render();
}

async function manualUpdate(){

    log("=== MANUAL REFRESH ===");

    for(let x of pf){

        const res = await price(x.s);

        x.p = res.p;
        x.src = res.src;
        x.status = res.status;

        log(`${x.s} -> ${res.p} (${res.src})`);
    }

    save();
    render();
}

function render(){

    const tbl = document.getElementById("tbl");
    tbl.innerHTML = "";

    let total = 0;
    let cost = 0;

    pf.forEach(x=>{

        const v = x.q * x.p;
        const c = x.q * x.b;

        const pl = v - c;
        const perc = c ? (pl/c)*100 : 0;

        total += v;
        cost += c;

        tbl.innerHTML += `
        <tr>
            <td>${x.s}</td>
            <td>${x.p.toFixed(2)}</td>
            <td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
            <td class="${
                x.status==='green'?'green':
                x.status==='yellow'?'yellow':'red'
            }">${x.src}</td>
        </tr>`;
    });

    log(`PORTFOLIO VALUE = ${total.toFixed(2)} | P/L ${(total-cost).toFixed(2)}`);

}

function save(){
    localStorage.setItem("pf", JSON.stringify(pf));
}

render();
log("SYSTEM READY");

</script>

</body>
</html>
