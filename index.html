<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Terminal</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#05070f;
    color:#cbd5e1;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#0f172a;
    padding:12px;
    border-radius:10px;
    margin:10px 0;
}

input,button{
    padding:8px;
    margin:4px;
    border-radius:6px;
    border:none;
}

button{background:#2563eb;color:white;cursor:pointer;}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    padding:6px;
    border-bottom:1px solid #1e293b;
    text-align:center;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#eab308;}

.terminal{
    background:black;
    color:#22c55e;
    padding:10px;
    height:200px;
    overflow:auto;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 TERMINAL MODE PORTFOLIO</h2>

<div class="card">
<input id="s" placeholder="TICKER">
<input id="q" type="number" placeholder="QTA">
<input id="b" type="number" placeholder="BUY">
<button onclick="add()">ADD</button>
<button onclick="manualUpdate()">REFRESH</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>ASSET</th>
<th>PRICE</th>
<th>P/L</th>
<th>STATUS</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>
</div>

<div class="card">
<div class="terminal" id="term"></div>
</div>

</div>

<script>

let pf = JSON.parse(localStorage.getItem("pf")) || [];

function log(msg){
    const t = document.getElementById("term");
    const time = new Date().toLocaleTimeString();
    t.innerHTML += `[${time}] ${msg}<br>`;
    t.scrollTop = t.scrollHeight;
}

async function price(s){

    try{
        log(`FETCH ${s}`);

        const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${s}`;
        const r = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));

        if(!r.ok){
            log(`ERROR HTTP ${s}`);
            return {p:0,status:"red"};
        }

        const j = await r.json();
        const p = j?.quoteResponse?.result?.[0]?.regularMarketPrice;

        if(typeof p !== "number"){
            log(`FALLBACK ${s}`);
            return {p:0,status:"yellow"};
        }

        log(`OK ${s} = ${p}`);
        return {p,status:"green"};

    }catch(e){
        log(`FAIL ${s}`);
        return {p:0,status:"red"};
    }
}

async function add(){

    const s = document.getElementById("s").value.toUpperCase();
    const q = +document.getElementById("q").value;
    const b = +document.getElementById("b").value;

    if(!s || !q || !b){
        alert("compila tutto");
        return;
    }

    const res = await price(s);

    pf.push({
        s,q,b,
        p:res.p,
        status:res.status
    });

    save();
    render();
}

async function manualUpdate(){

    log("=== MANUAL REFRESH ===");

    for(let x of pf){

        const res = await price(x.s);

        x.p = res.p;
        x.status = res.status;

        log(`${x.s} -> ${res.p} (${res.status})`);
    }

    render();
    save();
}

function render(){

    let tbl = document.getElementById("tbl");
    tbl.innerHTML = "";

    pf.forEach(x=>{

        let v = x.q * x.p;
        let c = x.q * x.b;
        let pl = v - c;

        let color =
            x.status === "green" ? "green" :
            x.status === "yellow" ? "yellow" : "red";

        tbl.innerHTML += `
        <tr>
            <td>${x.s}</td>
            <td>${x.p.toFixed(2)}</td>
            <td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
            <td class="${color}">${x.status}</td>
        </tr>`;
    });
}

function save(){
    localStorage.setItem("pf", JSON.stringify(pf));
}

render();

log("TERMINAL READY");

</script>

</body>
</html>
