<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Mode Portfolio</title>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#050814;
    color:#d1d5db;
}

.container{max-width:900px;margin:auto;padding:20px;}

.card{
    background:#111827;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

input,button{
    padding:8px;
    margin:4px;
    border-radius:6px;
    border:none;
}

button{background:#2563eb;color:white;cursor:pointer;}

table{width:100%;border-collapse:collapse;}

td,th{
    padding:6px;
    border-bottom:1px solid #1f2937;
    text-align:center;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#eab308;}

.terminal{
    background:black;
    color:#22c55e;
    height:180px;
    overflow:auto;
    padding:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 QUANT MODE (STABLE ENGINE)</h2>

<div class="card">
<input id="s" placeholder="TICKER (ENI.MI)">
<input id="q" type="number" placeholder="QTA">
<input id="b" type="number" placeholder="BUY">
<button onclick="add()">ADD</button>
<button onclick="refresh()">REFRESH</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>ASSET</th>
<th>PRICE</th>
<th>P/L</th>
<th>STATUS</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>
</div>

<div class="card">
<div class="terminal" id="term"></div>
</div>

</div>

<script>

let pf = JSON.parse(localStorage.getItem("pf") || "[]");
let cache = {};

function log(m){
    const t = document.getElementById("term");
    const time = new Date().toLocaleTimeString();
    t.innerHTML += `[${time}] ${m}<br>`;
    t.scrollTop = t.scrollHeight;
}

// =========================
// NORMALIZER QUANT
// =========================
function normalize(s){
    return s.toUpperCase().trim().replace(".MI","");
}

// =========================
// PRICE ENGINE (REALISTIC)
// =========================
async function fetchYahoo(symbol){

    try{

        const url =
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(
            `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`
        );

        const r = await fetch(url);
        const j = await r.json();

        const p = j?.quoteResponse?.result?.[0]?.regularMarketPrice;

        return (p && !isNaN(p)) ? p : null;

    }catch{
        return null;
    }
}

// =========================
// CORE QUANT PRICE
// =========================
async function price(symbol){

    const s = normalize(symbol);

    log(`TRY ${s}`);

    let p = await fetchYahoo(s);

    if(p){

        cache[symbol] = {p, t:Date.now()};

        log(`OK ${symbol} = ${p}`);

        return {
            p,
            status:"green",
            src:"yahoo"
        };
    }

    // cache fallback (quant rule)
    if(cache[symbol]?.p){

        log(`CACHE ${symbol} = ${cache[symbol].p}`);

        return {
            p:cache[symbol].p,
            status:"yellow",
            src:"cache"
        };
    }

    log(`FAIL ${symbol}`);

    return {
        p:0,
        status:"red",
        src:"error"
    };
}

// =========================
// PORTFOLIO OPS
// =========================
async function add(){

    const s = document.getElementById("s").value;
    const q = +document.getElementById("q").value;
    const b = +document.getElementById("b").value;

    if(!s || !q || !b){
        alert("compila tutto");
        return;
    }

    const r = await price(s);

    pf.push({
        s,q,b,
        p:r.p,
        status:r.status,
        src:r.src
    });

    save();
    render();
}

async function refresh(){

    log("=== QUANT REFRESH ===");

    for(let x of pf){

        const r = await price(x.s);

        x.p = r.p;
        x.status = r.status;
        x.src = r.src;

        log(`${x.s} -> ${x.p}`);
    }

    save();
    render();
}

// =========================
// RENDER ENGINE
// =========================
function render(){

    const tbl = document.getElementById("tbl");
    tbl.innerHTML = "";

    let total = 0;
    let cost = 0;

    pf.forEach(x=>{

        const v = x.q * x.p;
        const c = x.q * x.b;
        const pl = v - c;

        total += v;
        cost += c;

        tbl.innerHTML += `
        <tr>
            <td>${x.s}</td>
            <td>${x.p.toFixed(2)}</td>
            <td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
            <td>${x.status}</td>
        </tr>`;
    });

    log(`PORTFOLIO ${(total-cost).toFixed(2)}`);
}

function save(){
    localStorage.setItem("pf", JSON.stringify(pf));
}

render();
log("QUANT MODE READY");

</script>

</body>
</html>
